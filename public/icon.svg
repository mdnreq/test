<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0a1220; }
      .box { fill: #3b82f6; }
      .icon { stroke: #f8fafc; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #f8fafc; }
      .box { fill: #2563eb; }
      .icon { stroke: #0f172a; }
    }
  </style>
  <!-- Background -->
  <rect class="bg" width="180" height="180" rx="40" />
  
  <!-- Blue Box Container with Glow -->
  <rect class="box" x="35" y="35" width="110" height="110" rx="20" filter="url(#glow)" opacity="0.95" />
  
  <!-- Checkmark Icon -->
  <g>
    <path class="icon" d="M65 95 L80 108 L125 65" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>