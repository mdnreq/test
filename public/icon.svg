<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2"/>
      <feFlood flood-color="#3b82f6" flood-opacity="1" result="color"/>
      <feComposite in="color" in2="blur1" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0a1220; }
      .box { fill: #3b82f6; }
      .icon { stroke: #ffffff; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #ffffff; }
      .box { fill: #1d4ed8; }
      .icon { stroke: #000000; }
    }
  </style>
  <!-- Background -->
  <rect class="bg" width="180" height="180" rx="40" />
  
  <!-- Blue Box Container with Strong Glow -->
  <rect class="box" x="35" y="35" width="110" height="110" rx="20" filter="url(#strongGlow)" opacity="1" />
  
  <!-- Checkmark Icon -->
  <g>
    <path class="icon" d="M65 95 L80 108 L125 65" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
  </g>
</svg>